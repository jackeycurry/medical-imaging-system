version: '3.8'

services:
  backend:
    build:
      context: ./medical-system-backend-fastapi/medical-system-backend-fastapi/medical-system-backend-fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - QWEN_VL_MODEL=${QWEN_VL_MODEL:-qwen-vl-max}
    volumes:
      - ./medical-system-backend-fastapi/medical-system-backend-fastapi/medical-system-backend-fastapi:/app
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./medical-system-backend-fastapi/medical-system-backend-fastapi/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads:
